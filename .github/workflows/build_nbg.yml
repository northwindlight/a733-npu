name: Build EDSR x2 NBG

# 镜像托管在 ghcr.io/northwindlight/ubuntu-npu (private)，CI 用 GITHUB_TOKEN 拉。
# pegasus-convert 阶段需要 6G+ 内存、~4h CPU；GitHub 免费 runner (7G RAM / 14G SSD)
# 刚好够用，如果 OOM 则改 runs-on 到付费 larger runner。
permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
    inputs:
      resolution:
        description: 'CHW (例如 3,360,640)'
        default: '3,360,640'
        type: string
      npu:
        description: 'NPU target (v1/v2/v3)'
        default: 'v3'
        type: choice
        options: [v1, v2, v3]

jobs:
  export-onnx:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install torch==2.0.1 onnx onnxruntime super-image pillow
      - run: python3 scripts/export_onnx.py --resolution '${{ inputs.resolution }}' --output edsr_x2.onnx
      - uses: actions/upload-artifact@v4
        with: { name: edsr-onnx, path: edsr_x2.onnx }

  pegasus-convert:
    needs: export-onnx
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: edsr-onnx
          path: models/edsr_x2/

      - name: docker login ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: pull image
        run: docker pull ghcr.io/northwindlight/ubuntu-npu:v2.0.10.1

      - name: prepare calibration
        run: |
          docker run --rm -v "$PWD/models/edsr_x2:/wk" -w /wk \
            ghcr.io/northwindlight/ubuntu-npu:v2.0.10.1 \
            python3 prepare_calib.py --fallback-random --n 8

      - name: pegasus pipeline
        run: |
          docker run --rm -v "$PWD:/workspace" \
            ghcr.io/northwindlight/ubuntu-npu:v2.0.10.1 \
            bash /workspace/scripts/pipeline.sh edsr_x2 ${{ inputs.npu }}

      - uses: actions/upload-artifact@v4
        with:
          name: edsr-nbg-${{ inputs.npu }}
          path: models/edsr_x2/wksp/edsr_x2_uint8/**/*.nb
